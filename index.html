<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise AI AgentOps Platform · AI 에이전트 통합 형상관리 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="assets/style.css?v=itcen2" />
</head>
<body>
<div id="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#8b7cff"/><stop offset="1" stop-color="#4b5cff"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#lg)"/>
          <circle cx="16" cy="16" r="4" fill="#fff"/>
          <circle cx="16" cy="7" r="2.2" fill="#fff" opacity=".9"/>
          <circle cx="24" cy="20" r="2.2" fill="#fff" opacity=".9"/>
          <circle cx="8" cy="20" r="2.2" fill="#fff" opacity=".9"/>
          <path d="M16 12 V9 M16 16 L22.5 19.2 M16 16 L9.5 19.2" stroke="#fff" stroke-width="1.4" opacity=".7"/>
        </svg>
      </div>
      <div class="brand-text">
        <strong>Enterprise AI <br> AgentOps Platform</strong>
        <span>One Console AI </span>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-group">하나의 콘솔</div>
      <a class="nav-item active" data-view="dashboard"><i data-i="grid"></i>대시보드</a>
      <div class="nav-group">1 · Knowledge</div>
      <a class="nav-item" data-view="knowledge"><i data-i="book"></i>RAG 데이터 파이프라인</a>
      <div class="nav-group">2 · Config</div>
      <a class="nav-item" data-view="agents"><i data-i="bot"></i>AI Agent Config<span class="badge" id="agentCount"></span></a>
      <a class="nav-item" data-view="prompts"><i data-i="git"></i>System Prompt</a>
      <a class="nav-item" data-view="search"><i data-i="search"></i>벡터 검색 설정</a>
      <div class="nav-group">3 · 운영</div>
      <a class="nav-item" data-view="operations"><i data-i="pulse"></i>운영 대시보드</a>
      <a class="nav-item" data-view="improve"><i data-i="spark"></i>지속 개선</a>
      <div class="nav-group">개발 연동</div>
      <a class="nav-item" data-view="api"><i data-i="chat"></i>ITCEN-API · Chat 테스트</a>
    </nav>

    <div class="sidebar-foot">
      <div class="health">
        <div class="health-dot"></div>
        <div>
          <strong>시스템 정상</strong>
          <span>가동률 99.98%</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-btn" id="menuBtn"><i data-i="menu"></i></button>
      <div class="crumbs"><span id="crumbRoot">플랫폼</span><i data-i="chev"></i><b id="crumbLeaf">대시보드</b></div>
      <div class="topbar-search">
        <i data-i="search"></i>
        <input placeholder="Agent · 지식 · Prompt 검색  (⌘K)" />
      </div>
      <div class="topbar-right">
        <a class="ghost-btn" href="/docs" target="_blank" title="Swagger UI">Swagger</a>
        <button class="pill-btn" id="newAgentBtn"><i data-i="plus"></i> 새 Agent</button>
        <button class="icon-btn" title="알림"><i data-i="bell"></i><span class="dot"></span></button>
        <div class="avatar">SK</div>
      </div>
    </header>

    <div class="view-wrap" id="viewWrap"><!-- views injected --></div>
  </main>
</div>
<script src="assets/app.js?v=itcen2"></script>
</body>
</html>
